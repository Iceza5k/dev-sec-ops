apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: vault
  labels:
    app.kubernetes.io/name: vault-config
    app.kubernetes.io/part-of: devsecops-lab
data:
  config.hcl: |
    auto_auth {
      method "kubernetes" {
        mount_path = "auth/kubernetes"

        config = {
          role = "demo-app"
        }
      }

      sink "file" {
        config = {
          path = "/home/vault/.token"
        }
      }
    }

    exit_after_auth = false
    pid_file = "/home/vault/.pid"

    template {
      contents = "{{- with secret \"secret/data/demo\" -}}{{ range $k, $v := .Data.data }}{{ $k }}={{ $v }}\n{{ end }}{{- end -}}"
      destination = "/vault/secrets/demo.env"
    }

    vault {
      address = "http://vault.vault.svc.cluster.local:8200"
    }

  config-init.hcl: |
    auto_auth {
      method "kubernetes" {
        mount_path = "auth/kubernetes"

        config = {
          role = "demo-app"
        }
      }

      sink "file" {
        config = {
          path = "/home/vault/.token"
        }
      }
    }

    exit_after_auth = true
    pid_file = "/home/vault/.pid"

    template {
      contents = "{{- with secret \"secret/data/demo\" -}}{{ range $k, $v := .Data.data }}{{ $k }}={{ $v }}\n{{ end }}{{- end -}}"
      destination = "/vault/secrets/demo.env"
    }

    vault {
      address = "http://vault.vault.svc.cluster.local:8200"
    }
