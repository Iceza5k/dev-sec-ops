apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-argocd-secret-reader
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: devsecops-lab
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["argocd-initial-admin-secret"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-argocd-secret-reader-binding
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: devsecops-lab
subjects:
  - kind: ServiceAccount
    name: jenkins
    namespace: jenkins
roleRef:
  kind: Role
  name: jenkins-argocd-secret-reader
  apiGroup: rbac.authorization.k8s.io
