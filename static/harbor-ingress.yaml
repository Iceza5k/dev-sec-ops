apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: harbor-ingress
  namespace: harbor
  annotations:
    # Critical for Docker push through Istio
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: istio
  rules:
  - host: harbor.tpinf.xyz
    http:
      paths:
      - path: /api/
        pathType: Prefix
        backend:
          service:
            name: my-harbor-core
            port:
              number: 80
      - path: /c/
        pathType: Prefix
        backend:
          service:
            name: my-harbor-core
            port:
              number: 80
      - path: /service/
        pathType: Prefix
        backend:
          service:
            name: my-harbor-core
            port:
              number: 80
      - path: /v2/
        pathType: Prefix
        backend:
          service:
            name: my-harbor-registry    # ← changed from my-harbor-core
            port:
              number: 5000              # ← changed from 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: my-harbor-portal
            port:
              number: 80