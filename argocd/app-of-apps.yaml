# ──────────────────────────────────────────────────────────────────────────────
# App of Apps — Root Application
#
# This single Application watches the argocd/ directory in git.
# When synced, it automatically applies app-list.yaml and creates all
# child Applications. Any changes pushed to app-list.yaml in git will
# be picked up and applied automatically.
#
# Apply once (bootstrap):
#   kubectl apply -f argocd/app-of-apps.yaml
#
# Or via Argo CD UI:
#   + NEW APP → Edit as YAML → paste this file → Create → Sync
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: devsecops-lab
  # Finalizer ensures child apps are deleted when root app is deleted
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Iceza5k/dev-sec-ops.git
    targetRevision: HEAD
    path: argocd
    directory:
      # Only process the app-list.yaml file in this directory
      include: "app-list.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true       # remove Applications deleted from app-list.yaml
      selfHeal: true    # re-apply if someone manually changes the cluster
    syncOptions:
      - CreateNamespace=true
