---
# ── DefectDojo ────────────────────────────────────────────────────────────────
# Note: createSecret/createValkeySecret/createPostgresqlSecret are one-time
# bootstrap flags — intentionally excluded here to avoid re-creation on sync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: defectdojo
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: devsecops-lab
spec:
  project: default
  sources:
    - repoURL: https://raw.githubusercontent.com/DefectDojo/django-DefectDojo/helm-charts
      chart: defectdojo
      targetRevision: "*"
      helm:
        valueFiles:
          - $values/defectdojo/values-dojo.yaml
        parameters:
          - name: django.ingress.enabled
            value: "false"
    - repoURL: https://github.com/Iceza5k/dev-sec-ops.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: defectdojo
  syncPolicy:
    automated:
      selfHeal: true
      prune: false
    syncOptions:
      - CreateNamespace=true
---
# ── Argo CD ───────────────────────────────────────────────────────────────────
# Managing Argo CD itself with Argo CD (app-of-apps pattern).
# selfHeal: false — avoid Argo CD restarting itself unexpectedly.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: devsecops-lab
spec:
  project: default
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: "*"
      helm:
        releaseName: argocd
        valueFiles:
          - $values/argocd/values-argocd.yaml
    - repoURL: https://github.com/Iceza5k/dev-sec-ops.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: false   # intentionally false — avoid self-restart loop
      prune: false
    syncOptions:
      - CreateNamespace=true
---
