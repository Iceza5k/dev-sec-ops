# ──────────────────────────────────────────────────────────────────────────────
# Argo CD — Application List
#
# Managed by app-of-apps.yaml — do NOT apply this file directly.
# Argo CD will auto-discover and apply it via the app-of-apps root Application.
#
# Each Application uses two sources (Argo CD >= 2.6):
#   source[0]: Helm chart from the public chart repo
#   source[1]: This git repo — provides values files via $values ref
#
# All apps have automated sync enabled:
#   - selfHeal: re-applies if someone manually changes the cluster
#   - prune: false (keep resources if removed from values — safer for stateful apps)
# ──────────────────────────────────────────────────────────────────────────────

# ── Jenkins ───────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: devsecops-lab
spec:
  project: default
  sources:
    - repoURL: https://charts.jenkins.io
      chart: jenkins
      targetRevision: "*"
      helm:
        valueFiles:
          - $values/jenkins/values.yaml
    - repoURL: https://github.com/Iceza5k/dev-sec-ops.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins
  syncPolicy:
    automated:
      selfHeal: true
      prune: false
    syncOptions:
      - CreateNamespace=true
---
# ── SonarQube ─────────────────────────────────────────────────────────────────
# Note: original install.sh uses --set flags (no values file).
# Using values-sonar.yaml with community edition settings.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sonarqube
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: devsecops-lab
spec:
  project: default
  sources:
    - repoURL: https://SonarSource.github.io/helm-chart-sonarqube
      chart: sonarqube
      targetRevision: "*"
      helm:
        valueFiles:
          - $values/sonarqube/values-sonar.yaml
        parameters:
          - name: community.enabled
            value: "true"
          - name: monitoringPasscode
            value: "admin123"
    - repoURL: https://github.com/Iceza5k/dev-sec-ops.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: sonarqube
  syncPolicy:
    automated:
      selfHeal: true
      prune: false
    syncOptions:
      - CreateNamespace=true
---
# ── Harbor ────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
