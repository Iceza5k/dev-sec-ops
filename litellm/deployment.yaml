apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: litellm
  labels:
    app: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      imagePullSecrets: 
      - name: regcred
      containers:
      - name: litellm
        image: harbor.local:30002/my-project/litellm:v1
        imagePullPolicy: Always
        args:
        - "--config"
        - "/app/config.yaml"
        ports:
        - containerPort: 4000
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 60
          periodSeconds: 5
        volumeMounts:
        - name: litellm-config-volume
          mountPath: /app/config.yaml
          subPath: config.yaml
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: litellm-secret
              key: DATABASE_URL
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-secret
              key: LITELLM_MASTER_KEY
        - name: JENKINS_BASIC_AUTH
          valueFrom:
            secretKeyRef:
              name: litellm-secret
              key: JENKINS_BASIC_AUTH
      volumes:
      - name: litellm-config-volume
        configMap:
          name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: litellm
spec:
  type: NodePort
  selector:
    app: litellm
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000
      nodePort: 30433
