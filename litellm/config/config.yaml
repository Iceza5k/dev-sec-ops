general_settings:
  store_model_in_db: true

model_list:
  - model_name: llama3        # name you call it by
    litellm_params:
      model: ollama/llama3
      api_base: http://ollama:11434

  - model_name: mistral
    litellm_params:
      model: ollama/mistral
      api_base: http://ollama:11434

mcp_servers:
  kube_mcp:
    transport: "sse"
    url: "http://kubernetes-mcp-server.kubernetes-mcp-server.svc.cluster.local:8080/sse"
  jenkins_mcp:
    transport: "sse"
    url: "http://mcp-jenkins.jenkins.svc.cluster.local:9887/sse"


      