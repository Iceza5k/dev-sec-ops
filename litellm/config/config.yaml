general_settings:
  store_model_in_db: true

model_list:
  - model_name: llama3        # name you call it by
    litellm_params:
      model: ollama/llama3
      api_base: http://ollama:11434

  - model_name: mistral
    litellm_params:
      model: ollama/mistral
      api_base: http://ollama:11434

mcp_servers:
  kube_mcp:
    transport: "stdio"
    command: "npx"
    args: ["-y", "kubernetes-mcp-server@latest"]
    env:
      KUBECONFIG: "/root/.kube/backup/nonprod-cicd-vayu"  # path to your kubeconfig
  jenkins_mcp:
    url: "https://jenkins.tpinf.xyz/mcp-server/mcp"
    transport: "http"
    allow_all_keys: true
    auth_type: "none"
    extra_headers: ["x-jenkins-url","x-jenkins-username","x-jenkins-password"]