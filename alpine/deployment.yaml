apiVersion: v1
kind: Namespace
metadata:
  name: alpine-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alpine
  namespace: alpine-demo
  labels:
    app.kubernetes.io/name: alpine
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alpine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alpine
    spec:
      containers:
        - name: alpine
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
          args:
            - while true; do echo "alpine demo is running"; sleep 30; done
          resources:
            requests:
              cpu: 100m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
