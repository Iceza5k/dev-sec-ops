apiVersion: v1
kind: Namespace
metadata:
  name: alpine-uat
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alpine-uat
  namespace: alpine-uat
  labels:
    app.kubernetes.io/name: alpine
    environment: uat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alpine
      environment: uat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alpine
        environment: uat
    spec:
      containers:
        - name: alpine
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
          args:
            - while true; do echo "alpine uat demo is running"; sleep 30; done
          resources:
            requests:
              cpu: 512m
              memory: 32Mi
            limits:
              cpu: 512m
              memory: 64Mi
