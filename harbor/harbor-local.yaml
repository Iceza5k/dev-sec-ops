expose:
  type: nodePort
  tls:
    enabled: false
  nodePort:
    name: http
    ports:
      http:
        nodePort: 30002

externalURL: http://localhost:30002

persistence:
  persistentVolumeClaim:
    registry:
      size: 5Gi
    chartmuseum:
      size: 1Gi
    jobservice:
      size: 1Gi
    database:
      size: 1Gi
    redis:
      size: 1Gi
    trivy:
      size: 1Gi