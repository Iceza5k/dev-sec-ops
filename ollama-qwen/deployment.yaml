apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-qwen-pvc
  namespace: ollama-qwen
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-qwen
  namespace: ollama-qwen
  labels:
    app.kubernetes.io/name: ollama-qwen
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama-qwen
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama-qwen
    spec:
      containers:
        - name: ollama-qwen
          image: ollama/ollama:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              ollama serve &
              until ollama list >/dev/null 2>&1; do sleep 1; done
              ollama pull qwen2.5-coder:1.5b
              wait
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_KEEP_ALIVE
              value: "-1"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-qwen-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-qwen
  namespace: ollama-qwen
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: ollama-qwen
  ports:
    - port: 11434
      targetPort: 11434
      nodePort: 30115
