# Default values for dongtai - Fixed for local Rancher lab
skipistio: true

# ✅ FIX 1: Changed from dead Aliyun registry → Docker Hub
images: dongtai
tag: latest
imagePullPolicy: Always
replicaCount: 1
requestsCpu: 100m
requestsMemory: 200Mi
limitsCpu: 500m
limitsMemory: 1000Mi
accessType: NodePort   # NodePort works better for local Rancher access
NodePort: 30080
logging_level: INFO
somaxconn: null
healthcheck: true
tcphealthcheck: true
logstash: "false"
migrate: false

nodeSelector:
  kubernetes.io/os: linux
  kubernetes.io/arch: amd64
podLabels: {}
env: {}

# ✅ FIX 2: Use chart-managed MySQL (no external DB needed in local lab)
skipMysql: true

mysql:
  host: mysql.dongtai.svc.cluster.local    # matches the service the chart creates
  port: 3306
  name: dongtai_webapi
  user: root
  password: dongtai-iast-

skipRedis: false
redis:
  host: dongtai-redis
  port: 6379
  password: ""
  db: 0

sca:
  sca_url: https://sca.tingyun.com/
  sca_token:

usb:
  usb_token:

# ✅ FIX 4: No PVC needed for local lab (was causing FailedMount)
storage:
  storageClassName: null
  persistentVolumeClaim: null   # null = disable agent log PVC

csrfTrustOrigins: .example.com

smtp:
  server: smtp_server
  user: smtp_user
  password: smtp_password
  from_addr: from_addr
  ssl: False
  cc_addr: cc_addr

build:
  agent_number: latest
  web_number: latest
  server_number: latest
  logstash_number: latest
  mysql_number: latest
  redis_number: latest
  env_server: --processes 4
  env_beta: --concurrency=2
  env_chain: -P gevent --concurrency=121
  env_es: -P gevent --concurrency=64
  env_high: -P gevent --concurrency=121
  env_other: -P gevent --concurrency=10
  env_sca: -P gevent --concurrency=10

develop:
  dev: