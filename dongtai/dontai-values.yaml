# Disable persistent storage
storage:
  persistentVolumeClaim: null

# Override ALL images from dead Aliyun registry → Docker Hub
image:
  registry: docker.io
  pullPolicy: Always

# Override each component image
server:
  image:
    repository: dongtai/dongtai-server
    tag: latest

engine:
  image:
    repository: dongtai/dongtai-engine
    tag: latest

web:
  image:
    repository: dongtai/dongtai-web
    tag: latest

logstash:
  image:
    repository: dongtai/dongtai-logstash
    tag: latest

mysql:
  enabled: true
  image:
    repository: dongtai/dongtai-mysql
    tag: latest
  auth:
    rootPassword: "dongtai-iast-"
    database: dongtai_webapi

redis:
  enabled: true
  image:
    repository: dongtai/dongtai-redis
    tag: latest
  auth:
    enabled: false

# Config
config:
  createConfig: true
  mysql:
    host: dongtai-iast-mysql
    port: 3306
    name: dongtai_webapi
    user: root
    password: dongtai-iast-
  redis:
    host: dongtai-iast-redis-master
    port: 6379
    password: ""