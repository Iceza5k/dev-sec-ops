apiVersion: apps/v1
kind: Deployment
metadata:
  name: dongtai-redis
  namespace: dongtai
spec:
  selector:
    matchLabels:
      app: dongtai-redis
  template:
    metadata:
      labels:
        app: dongtai-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: dongtai-redis
  namespace: dongtai
spec:
  selector:
    app: dongtai-redis
  ports:
  - port: 6379
    targetPort: 6379