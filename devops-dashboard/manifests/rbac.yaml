apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-dashboard-role
  labels:
    app.kubernetes.io/part-of: devsecops-lab
rules:
  # Permissions to query cluster health and services
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  # Permission to read logs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  # Permission to delete/restart pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devops-dashboard-binding
  labels:
    app.kubernetes.io/part-of: devsecops-lab
subjects:
  - kind: ServiceAccount
    name: devops-dashboard
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: devops-dashboard-role
  apiGroup: rbac.authorization.k8s.io
