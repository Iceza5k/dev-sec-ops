apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-dashboard
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: devsecops-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-dashboard
  namespace: monitoring
  labels:
    app: devops-dashboard
    app.kubernetes.io/part-of: devsecops-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-dashboard
  template:
    metadata:
      labels:
        app: devops-dashboard
        app.kubernetes.io/part-of: devsecops-lab
    spec:
      serviceAccountName: devops-dashboard
      containers:
        - name: dashboard
          image: devops-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: devops-dashboard
  namespace: monitoring
  labels:
    app: devops-dashboard
    app.kubernetes.io/part-of: devsecops-lab
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30090
      protocol: TCP
  selector:
    app: devops-dashboard
